services:
  - name: melbet-live-backend-private
    type: pserv
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: melbet-live-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false

  - name: melbet-live-frontend
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /ar
    envVars:
      - key: INTERNAL_API_BASE_URL
        fromService:
          type: pserv
          name: melbet-live-backend-private
          property: hostport

databases:
  - name: melbet-live-db
    plan: free
    databaseName: melbet_live
