services:
  - name: goal-stream-api
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: goal-stream-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SPORTS_PROVIDER
        value: rapidapi
      - key: FOOTBALL_DATA_BASE_URL
        value: https://free-api-live-football-data.p.rapidapi.com
      - key: FOOTBALL_DATA_RAPIDAPI_HOST
        value: free-api-live-football-data.p.rapidapi.com
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false

  - name: goal-stream-web
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /ar
    envVars:
      - key: INTERNAL_API_BASE_URL
        fromService:
          type: web
          name: goal-stream-api
          property: hostport

databases:
  - name: goal-stream-db
    plan: free
    databaseName: goal_stream
